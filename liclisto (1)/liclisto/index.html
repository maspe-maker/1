<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LicListo — Gestión de expedientes, plazos fatales y análisis legal con IA para despachos mexicanos." />
  <title>LicListo · Control de Expedientes</title>

  <!-- Tipografías: Fraunces (display jurídico), Inter (cuerpo), JetBrains Mono (números de expediente) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN con tokens de diseño de LicListo -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tinta:   { DEFAULT: '#1A2740', 900: '#101A2E', 700: '#27375A', 500: '#41547F' },
            papel:   { DEFAULT: '#F6F4EE', 100: '#FCFBF8', 300: '#EBE7DC' },
            sello:   { DEFAULT: '#9E2B25', 600: '#86211C', 100: '#F6E3E1' },
            olivo:   { DEFAULT: '#3E6B4F', 100: '#E4EFE7' },
            ambar:   { DEFAULT: '#B07D2B', 100: '#F7EDD9' },
            grafito: '#4A4A45'
          },
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace']
          },
          boxShadow: {
            legajo: '0 1px 2px rgba(16,26,46,.06), 0 8px 24px -12px rgba(16,26,46,.18)'
          }
        }
      }
    }
  </script>

  <style>
    html { background: #F6F4EE; }
    ::selection { background: #1A2740; color: #F6F4EE; }
    :focus-visible { outline: 2px solid #9E2B25; outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* ── Reporte exportable: impresión multipágina sin cortes ── */
    @media print {
      html, body, #root {
        height: auto !important;
        min-height: auto !important;
        overflow: visible !important;
        display: block !important;
        background: #fff !important;
      }
      .print\:hidden { display: none !important; }
      .print\:block  { display: block !important; }
      .print\:p-0    { padding: 0 !important; }
      .avoid-break   { break-inside: avoid; }
    }
  </style>
</head>
<body class="font-sans text-tinta antialiased">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
